<form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form">
  <h2 class="form-title">➕ Nueva Tarea</h2>
  
  <div class="form-group">
    <label for="titulo" class="form-label">Título de la tarea *</label>
    <input
      id="titulo"
      type="text"
      formControlName="titulo"
      class="form-input"
      placeholder="Tarea"
      [class.input-error]="getControl('titulo')?.invalid && getControl('titulo')?.touched"
    />
    <div class="error-message" *ngIf="getControl('titulo')?.invalid && getControl('titulo')?.touched">
      <span *ngIf="getControl('titulo')?.errors?.['required']">El título es requerido</span>
      <span *ngIf="getControl('titulo')?.errors?.['minlength']">El título debe tener al menos 3 caracteres</span>
    </div>
  </div>

  <div class="form-group">
    <label for="descripcion" class="form-label">Descripción (opcional)</label>
    <textarea
      id="descripcion"
      formControlName="descripcion"
      class="form-textarea"
      placeholder="Detalle Tarea"
      rows="3"
      [class.input-error]="getControl('descripcion')?.invalid && getControl('descripcion')?.touched"
    ></textarea>
    <div class="error-message" *ngIf="getControl('descripcion')?.invalid && getControl('descripcion')?.touched">
      <span *ngIf="getControl('descripcion')?.errors?.['minlength']">La descripción debe tener al menos 5 caracteres</span>
    </div>
  </div>

  <button
    type="submit"
    class="btn-submit"
    [disabled]="taskForm.invalid || isSubmitting"
  >
    <span *ngIf="!isSubmitting">✅ Crear Tarea</span>
    <span *ngIf="isSubmitting">⏳ Creando...</span>
  </button>
</form>
